# Brings up the full local ServeRest environment for the tests:
#   - api   -> REST backend on port 3000 (official image)
#   - front -> frontend on port 3001, built pointing at the local api
#
# Usage: docker compose up -d --build --wait
services:
  api:
    image: paulogoncalvesbh/serverest:latest
    ports:
      - '3000:3000'
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://localhost:3000/usuarios',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  front:
    build:
      context: ./docker/front
    ports:
      - '3001:3001'
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://localhost:3001',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
