name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies (no Cypress binary needed)
        run: npm ci
        env:
          CYPRESS_INSTALL_BINARY: 0

      - name: ESLint
        run: npm run lint

      - name: Prettier format check
        run: npm run format:check

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache Cypress binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-binary-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            cypress-binary-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npm run test:api

      - name: Upload API test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-api-report
          path: cypress/results
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload API failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-api-screenshots
          path: cypress/screenshots
          retention-days: 7
          if-no-files-found: ignore

  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache Cypress binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-binary-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            cypress-binary-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Start local stack (api + front)
        run: npm run stack:up

      - name: Run UI tests
        run: npm run test:ui

      - name: Docker compose logs (on failure)
        if: failure()
        run: docker compose logs

      - name: Tear down stack
        if: always()
        run: npm run stack:down
        continue-on-error: true

      - name: Upload UI test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-ui-report
          path: cypress/results
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload UI failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-ui-evidence
          path: |
            cypress/videos
            cypress/screenshots
          retention-days: 7
          if-no-files-found: ignore
